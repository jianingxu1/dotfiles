# Reload tmux settings with <leader> + r
unbind r
bind r source-file ~/.tmux.conf

set -g prefix C-s

# Enable mouse scrolling
set -g mouse on

# Start windows and panes index at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1

# Ensure window index numbers get reordered on delete.
set-option -g renumber-windows on

# Allow escape sequences to pass through to terminal
set -g allow-passthrough on

# Forward bells from ALL panes to terminal (not just the active one)
set -g bell-action any

# Enable bell monitoring
set -g monitor-bell on

# Activity monitoring disabled - rely only on bell monitoring for notifications
set -g monitor-activity off

# Prefer the status-line bell indicators over flashing the pane
set -g visual-bell off

# Ensure tmux doesn't jump or flash the status bar
set -g visual-activity off

# 2. Define the format: [Index]:[Name][Yellow Bell if Bell]
# This says: If bell exists, print " 🔔". If not, print nothing.
set -g window-status-format "#I:#W#{?window_bell_flag,#[fg=yellow]🔔#[default],}"

# Current Window: [Index]:[Name] followed by the Circle icon
set -g window-status-current-format "#[fg=bold]#I:#W📍#[default]"

# Force the bell and activity styles to be "empty"
setw -g window-status-activity-style bg=default,fg=default,none
setw -g window-status-bell-style bg=default,fg=default,none

# Use Ctrl-n/p to cycle windows quickly without releasing the Ctrl key
bind-key -r C-n next-window
bind-key -r C-p previous-window

# Act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
